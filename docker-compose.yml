services:
  app:
    build: .
    expose:
      - "3000"
    depends_on:
      - postgres
      - redis
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    labels:
      - "traefik.enable=false"
    networks:
      - traefik-network
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ixon_academy
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - internal
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    networks:
      - internal
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

networks:
  traefik-network:
    external: true
  internal:
    driver: bridge
