services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ixon_academy
      POSTGRES_USER: ixon_admin
      POSTGRES_PASSWORD: ixon_dev_password
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata_dev:/data
    restart: unless-stopped

volumes:
  pgdata_dev:
  redisdata_dev:
